<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.001; filterBeta: 0.01;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid1" src="1_justicia.mp4" preload="auto" loop="true" muted playsinline></video>
        <video id="vid2" src="2_legislatura.mp4" preload="auto" loop="true" muted playsinline></video>
        <video id="vid3" src="3_gobierno.mp4" preload="auto" loop="true" muted playsinline></video>
        <video id="vid4" src="4_capilla.mp4" preload="auto" loop="true" muted playsinline></video>
        <video id="vid5" src="5_banco.mp4" preload="auto" loop="true" muted playsinline></video>
        <video id="vid6" src="6_centro.mp4" preload="auto" loop="true" muted playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#vid1" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 1">
        <a-video src="#vid2" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 2">
        <a-video src="#vid3" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 3">
        <a-video src="#vid4" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 4">
        <a-video src="#vid5" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>

      <a-entity mindar-image-target="targetIndex: 5">
        <a-video src="#vid6" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>

    </a-scene>

    <script>
      // Script para auto-reproducción al detectar el target
      const sceneEl = document.querySelector('a-scene');
      
      sceneEl.addEventListener("targetFound", event => {
        const index = event.detail.targetIndex;
        const video = document.querySelector(`#vid${index + 1}`);
        video.play();
      });

      sceneEl.addEventListener("targetLost", event => {
        const index = event.detail.targetIndex;
        const video = document.querySelector(`#vid${index + 1}`);
        video.pause();
      });
    </script>
  </body>
</html>
